spring.application.name=autoemply-server
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/emply}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
app.ai.api-key=${ANTHROPIC_API_KEY:}
app.ai.model=${ANTHROPIC_MODEL:claude-sonnet-4-6}
app.ai.api-url=${ANTHROPIC_API_URL:https://api.anthropic.com/v1/messages}
app.ai.request-timeout-seconds=${ANTHROPIC_REQUEST_TIMEOUT_SECONDS:120}
app.ai.max-retry-attempts=${ANTHROPIC_MAX_RETRY_ATTEMPTS:2}

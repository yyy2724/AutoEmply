name: Deploy Server to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # Tests gate the jar build: a failing test stops the deploy.
      - name: Test & build with Gradle
        run: |
          cd AutoEmply-server
          chmod +x gradlew
          ./gradlew test bootJar

      - name: Copy jar to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "AutoEmply-server/build/libs/*-SNAPSHOT.jar"
          target: "/home/ubuntu/app/"
          strip_components: 3

      - name: Restart service
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mv /home/ubuntu/app/*-SNAPSHOT.jar /home/ubuntu/app/autoemply.jar
            sudo systemctl restart autoemply
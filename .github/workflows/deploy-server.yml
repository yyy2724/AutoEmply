name: Deploy Server to EC2
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/AutoEmply-Java/AutoEmply-server
            git pull
            chmod +x gradlew
            ./gradlew bootJar
            cp build/libs/*-SNAPSHOT.jar /home/ubuntu/app/autoemply.jar
            sudo systemctl restart autoemply